version: '3.8'

services:
  # PostgreSQL 資料庫
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: quizapp
      POSTGRES_USER: quizuser
      POSTGRES_PASSWORD: quizpass123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - quiz-network

  # Redis 快取
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - quiz-network

  # Django 後端服務
  django:
    build:
      context: ./backend-django
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://quizuser:quizpass123@postgres:5432/quizapp
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=0
      - ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    volumes:
      - ./backend-django:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    networks:
      - quiz-network
    command: >
      sh -c "python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              gunicorn --bind 0.0.0.0:8000 --workers 3 main:app"

  # ML 服務
  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    environment:
      - FLASK_ENV=production
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./ml-service:/app
    ports:
      - "5000:5000"
    depends_on:
      - redis
    networks:
      - quiz-network
    command: gunicorn --bind 0.0.0.0:5000 --workers 2 main:app

  # React 前端
  frontend:
    build:
      context: ./frontend/my-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - django
      - ml-service
    networks:
      - quiz-network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - django
      - ml-service
    networks:
      - quiz-network

volumes:
  postgres_data:
  static_volume:
  media_volume:

networks:
  quiz-network:
    driver: bridge